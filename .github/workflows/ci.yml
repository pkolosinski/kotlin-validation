name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - run: ./gradlew build

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Determine bump type from conventional commits
        id: bump
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -q "^BREAKING CHANGE"; then
            echo "incrementer=incrementMajor" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -q "^feat"; then
            echo "incrementer=incrementMinor" >> "$GITHUB_OUTPUT"
          else
            echo "incrementer=incrementPatch" >> "$GITHUB_OUTPUT"
          fi

      - name: Release
        run: ./gradlew release -Prelease.versionIncrementer=${{ steps.bump.outputs.incrementer }}

  publish:
    if: github.event_name == 'push'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
