name: Release

on:
  workflow_run:
    workflows: [ "Build" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Determine bump type from conventional commits
        id: bump
        env:
          COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -q "^BREAKING CHANGE"; then
            echo "incrementer=incrementMajor" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -q "^feat"; then
            echo "incrementer=incrementMinor" >> "$GITHUB_OUTPUT"
          else
            echo "incrementer=incrementPatch" >> "$GITHUB_OUTPUT"
          fi

      - name: Release
        run: ./gradlew release -Prelease.versionIncrementer=${{ steps.bump.outputs.incrementer }}
